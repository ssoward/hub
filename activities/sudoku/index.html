<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1d4ed8">
  <title>Sudoku — Scott Soward</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/icons/favicon.svg">
  <link rel="stylesheet" href="../../css/site.css">
  <link rel="stylesheet" href="../../css/games.css">
  <style>
    .sd-grid { display: grid; grid-template-columns: repeat(9, minmax(28px, 44px)); gap: 0; background: var(--ink); padding: 2px; border-radius: var(--r-md); }
    .sd-cell { aspect-ratio: 1/1; background: var(--bg); border: 1px solid var(--border); font: inherit; font-weight: 700; font-size: var(--fs-md); text-align: center; padding: 0; cursor: pointer; }
    .sd-cell.given { background: var(--surface); color: var(--ink); cursor: default; font-weight: 800; }
    .sd-cell.user { color: var(--accent); }
    .sd-cell.selected { outline: 3px solid var(--accent); outline-offset: -3px; z-index: 1; position: relative; }
    .sd-cell.conflict { color: #b91c1c; background: #fef2f2; }
    /* 3x3 box dividers */
    .sd-cell:nth-child(9n+1) { border-left-width: 2px; border-left-color: var(--ink); }
    .sd-cell:nth-child(9n+4), .sd-cell:nth-child(9n+7) { border-left-width: 2px; border-left-color: var(--ink); }
    .sd-cell:nth-child(9n) { border-right-width: 2px; border-right-color: var(--ink); }
    .sd-cell:nth-child(-n+9) { border-top-width: 2px; border-top-color: var(--ink); }
    .sd-cell:nth-child(n+19):nth-child(-n+27), .sd-cell:nth-child(n+28):nth-child(-n+36),
    .sd-cell:nth-child(n+46):nth-child(-n+54), .sd-cell:nth-child(n+55):nth-child(-n+63) { border-top-width: 2px; border-top-color: var(--ink); }
    .sd-cell:nth-child(n+73) { border-bottom-width: 2px; border-bottom-color: var(--ink); }
    .sd-keys { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 440px; width: 100%; }
    .sd-key { font: inherit; font-weight: 700; min-height: 44px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--r-md); cursor: pointer; }
    .sd-key:hover { background: var(--accent-soft); border-color: var(--accent); }
  </style>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<header class="site-header">
  <div class="container site-header-inner">
    <a class="brand" href="../../"><span class="brand-name">Scott Soward</span><span class="brand-role">Engineer · Builder · Teacher</span></a>
    <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="primary-nav" aria-label="Toggle menu"><span aria-hidden="true">☰</span></button>
    <nav id="primary-nav" class="site-nav" aria-label="Primary">
      <a href="../../">Home</a>
      <a href="../../presentations/">Gospel</a>
      <a href="../../tech-presentations/">Tech &amp; AI</a>
      <a href="../" aria-current="page">Activities</a>
      <a href="../../conferences/">Conferences</a>
      <a href="../../alma31.html">Scripture</a>
    </nav>
  </div>
</header>

<main id="main">
  <section class="site-hero container">
    <p class="hero-eyebrow">Activity · logic puzzle</p>
    <h1 class="hero-title">Sudoku</h1>
    <p class="hero-lede">Fill the grid so every row, column, and 3×3 box contains the digits 1 through 9.</p>
  </section>

  <section class="section container">
    <div class="game-stage">
      <div class="game-status">
        <label>Difficulty <select id="diff">
          <option value="easy" selected>Easy</option>
          <option value="med">Medium</option>
        </select></label>
      </div>
      <div class="sd-grid" id="grid" role="grid" aria-label="Sudoku grid"></div>
      <div class="sd-keys">
        <button type="button" class="sd-key" data-k="1">1</button>
        <button type="button" class="sd-key" data-k="2">2</button>
        <button type="button" class="sd-key" data-k="3">3</button>
        <button type="button" class="sd-key" data-k="4">4</button>
        <button type="button" class="sd-key" data-k="5">5</button>
        <button type="button" class="sd-key" data-k="6">6</button>
        <button type="button" class="sd-key" data-k="7">7</button>
        <button type="button" class="sd-key" data-k="8">8</button>
        <button type="button" class="sd-key" data-k="9">9</button>
        <button type="button" class="sd-key" data-k="0">⌫</button>
      </div>
      <p class="message-line" id="msg" aria-live="polite"></p>
      <div class="game-controls">
        <button type="button" class="btn btn-primary" id="reset">New puzzle</button>
        <button type="button" class="btn btn-ghost" id="check">Check</button>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container site-footer-inner">
    <span>© <span id="year">2026</span> Scott Soward · Activity</span>
    <a href="../">&larr; Back to activities</a>
  </div>
</footer>

<script>
  (function() {
    const b = document.querySelector('.nav-toggle'); const n = document.getElementById('primary-nav');
    if (!b || !n) return;
    b.addEventListener('click', () => { const o = n.classList.toggle('open'); b.setAttribute('aria-expanded', String(o)); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && n.classList.contains('open')) { n.classList.remove('open'); b.setAttribute('aria-expanded','false'); b.focus(); } });
  })();
  document.getElementById('year').textContent = new Date().getFullYear();

  // Solution + a few givens-removed templates. 0 = blank for player.
  const PUZZLES = {
    easy: [
      { puz: '530070000600195000098000060800060003400803001700020006060000280000419005000080079',
        sol: '534678912672195348198342567859761423426853791713924856961537284287419635345286179' },
      { puz: '000260701680070090190004500820100040004602900050003028009300074040050036703018000',
        sol: '435269781682571493197834562826195347374682915951743628519326874248957136763418259' },
    ],
    med: [
      { puz: '009000200060008900100027000200400006800001000900000007000700001020003000700005620',
        sol: '349568217265138974187927365253489176876251493914376857638794521421653789795815642' },
      { puz: '004300209005009001070060043006002087190007400050083000600000105003508690042910300',
        sol: '864371259325849761971265843436192587198657432257483916689734125713528694542916378' },
    ],
  };

  const grid = document.getElementById('grid');
  const msg = document.getElementById('msg');
  const diffSel = document.getElementById('diff');
  let cells, given, current, solution, selected;

  function start() {
    const set = PUZZLES[diffSel.value];
    const p = set[Math.floor(Math.random()*set.length)];
    const arr = p.puz.split('').map(Number);
    given = arr.map(v => v !== 0);
    current = arr.slice();
    solution = p.sol.split('').map(Number);
    selected = -1;
    msg.textContent = ''; msg.className = 'message-line';
    grid.innerHTML = ''; cells = [];
    for (let i = 0; i < 81; i++) {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'sd-cell' + (given[i] ? ' given' : ' user');
      b.textContent = arr[i] || '';
      b.disabled = given[i];
      b.addEventListener('click', () => select(i));
      cells.push(b); grid.appendChild(b);
    }
  }
  function select(i) {
    if (given[i]) return;
    if (selected >= 0) cells[selected].classList.remove('selected');
    selected = i;
    cells[i].classList.add('selected');
  }
  function setVal(v) {
    if (selected < 0) return;
    current[selected] = v;
    cells[selected].textContent = v || '';
    validate();
  }
  function validate() {
    cells.forEach((c, i) => { if (!given[i]) c.classList.remove('conflict'); });
    for (let i = 0; i < 81; i++) {
      const v = current[i]; if (!v) continue;
      const r = Math.floor(i/9), c = i%9, br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
      for (let j = 0; j < 9; j++) {
        if (j !== c && current[r*9+j] === v) { cells[i].classList.add('conflict'); cells[r*9+j].classList.add('conflict'); }
        if (j !== r && current[j*9+c] === v) { cells[i].classList.add('conflict'); cells[j*9+c].classList.add('conflict'); }
      }
      for (let rr = br; rr < br+3; rr++) for (let cc = bc; cc < bc+3; cc++) {
        const k = rr*9+cc; if (k !== i && current[k] === v) { cells[i].classList.add('conflict'); cells[k].classList.add('conflict'); }
      }
    }
    if (current.every((v, i) => v === solution[i])) { msg.textContent = 'Solved!'; msg.className = 'message-line win'; }
  }
  document.querySelectorAll('.sd-key').forEach(k => k.addEventListener('click', () => setVal(parseInt(k.dataset.k, 10))));
  document.addEventListener('keydown', e => {
    if (e.key >= '1' && e.key <= '9') setVal(parseInt(e.key,10));
    if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') setVal(0);
  });
  document.getElementById('reset').addEventListener('click', start);
  document.getElementById('check').addEventListener('click', () => {
    let wrong = 0; current.forEach((v,i) => { if (v && v !== solution[i]) wrong++; });
    if (wrong === 0 && current.every(v => v)) { msg.textContent = 'All correct — solved!'; msg.className='message-line win'; }
    else if (wrong === 0) { msg.textContent = 'So far so good. Keep going.'; msg.className='message-line'; }
    else { msg.textContent = `${wrong} cell${wrong>1?'s':''} look wrong.`; msg.className='message-line lose'; }
  });
  diffSel.addEventListener('change', start);
  start();
</script>

</body>
</html>
